<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sign Up Screen</title>
    <!-- BEGIN: Scripts -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandDeepBlue: '#1C57B5',
                        brandPrimary: '#2E5B9A',
                        brandGray: '#718096',
                        brandBorder: '#E2E8F0'
                    },
                    borderRadius: {
                        '4xl': '50px',
                    }
                }
            }
        }
    </script>
    <!-- END: Scripts -->
    <!-- BEGIN: Custom Styles -->
    <style data-purpose="layout-adjustments">
        /* Remove default focus ring and only show bottom border */
        .custom-input {
            border: none !important;
            border-bottom: 1px solid #E0E0E0 !important;
            border-radius: 0 !important;
            padding-left: 0 !important;
            padding-right: 0 !important;
            background-color: transparent !important;
            box-shadow: none !important;
        }

        .custom-input:focus {
            outline: none !important;
            box-shadow: none !important;
            border-bottom-color: #2E5B9A !important;
        }

        /* Ensure the body takes full height and has no scroll */
        body,
        html {
            height: 100%;
            margin: 0;
            overflow-x: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
    </style>
    <!-- END: Custom Styles -->
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-white">
    <!-- BEGIN: MainContainer -->
    <main class="relative min-h-screen flex flex-col">
        <!-- BEGIN: HeaderSection -->
        <section class="bg-brandDeepBlue h-[353px] relative flex justify-center items-end"
            data-purpose="top-illustration-container">
            <!-- Illustration Placeholder -->
            <img alt="Team Illustration" class="w-full h-full object-contain object-bottom" data-purpose="hero-image"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuB3XOTAWPuqWIB2kn5Nh3ugwyt85oZSY6qWzzqe24OcAqL8crq67jgX7QA4xZ59RjSuwimabEAFZ4Goj1J0t471NsQWR75xSWMQwWLbEilXOiWx1-KT0yfnVUMzKeLf8rPuCMBhGWuBpnavPJ62_ldXswsvVdQT8xAl20gfOGZRETtPs-m-JRNWPe_vhDUvcfiDfRX6IpcliU-eMuyahEBEatVwV2hdVBHXz60aabTSIWYuKqgPNbKB9OH2bpiiVx2tOzbMQBAQ0BfU" />
        </section>
        <!-- END: HeaderSection -->
        <!-- BEGIN: FormSection -->
        <section class="bg-brandDeepBlue flex-1" data-purpose="form-overlap-container">
            <!-- White card container overlapping the blue background -->
            <div class="bg-white rounded-t-[50px] h-full -mt-20 relative px-10 pt-10 pb-8 shadow-2xl flex flex-col">
                <!-- Welcome Heading -->
                <div class="mb-10" data-purpose="form-header">
                    <h1 class="text-3xl font-medium">
                        <span class="text-brandPrimary font-bold">Welcome,</span>
                        <span class="text-gray-600">Sign Up</span>
                    </h1>
                </div>
                <!-- Sign Up Form -->
                <form class="space-y-[25px] flex-1" data-purpose="signup-form">
                    <!-- First and Last Name Row -->
                    <div class="flex w-full gap-6">
                        <div class="w-1/2">
                            <input class="custom-input w-full text-lg py-2 text-gray-700" placeholder="First Name"
                                required="" type="text" />
                        </div>
                        <div class="w-1/2">
                            <input class="custom-input w-full text-lg py-2 text-gray-700" placeholder="Last Name"
                                required="" type="text" />
                        </div>
                    </div>
                    <!-- Contact Number Field -->
                    <div>
                        <input class="custom-input w-full text-lg py-2" placeholder="Contact No." required=""
                            type="tel" />
                    </div>
                    <!-- Email Field -->
                    <div>
                        <input class="custom-input w-full text-lg py-2" placeholder="Email" required="" type="email" />
                    </div>
                    <!-- City Dropdown Field -->
                    <div class="relative">
                        <select class="custom-input w-full text-lg py-2 appearance-none cursor-pointer" required="">
                            <option disabled="" selected="" value="">City</option>
                            <option value="london">London</option>
                            <option value="newyork">New York</option>
                            <option value="tokyo">Tokyo</option>
                        </select>
                        <!-- Dropdown Arrow Icon -->
                        <div class="absolute right-0 top-3 pointer-events-none"><svg class="h-5 w-5 text-gray-500"
                                fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24"
                                xmlns="http://www.w3.org/2000/svg">
                                <path d="M19.5 8.25l-7.5 7.5-7.5-7.5" stroke-linecap="round" stroke-linejoin="round">
                                </path>
                            </svg></div>
                    </div>
                    <!-- Submit Button Container -->
                    <div class="flex justify-center pt-16" data-purpose="submit-button-container">
                        <button
                            class="bg-brandPrimary w-[60px] h-[60px] rounded-full flex items-center justify-center shadow-xl shadow-brandPrimary/40 active:scale-95 transition-transform"
                            type="submit">
                            <!-- Right Arrow SVG -->
                            <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" stroke-width="3"
                                viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M14 5l7 7m0 0l-7 7m7-7H3" stroke-linecap="round" stroke-linejoin="round">
                                </path>
                            </svg>
                        </button>
                    </div>
                </form>
                <!-- BEGIN: FooterLinks -->
                <footer class="mt-12 text-center" data-purpose="form-footer">
                    <p class="text-gray-800 text-base">
                        Already Have An Account?
                        <a class="text-brandPrimary font-bold ml-1" href="#">Sign In</a>
                    </p>
                </footer>
                <!-- END: FooterLinks -->
            </div>
        </section>
        <!-- END: FormSection -->
    </main>
    <!-- END: MainContainer -->
</body>

</html>
