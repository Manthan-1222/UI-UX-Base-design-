<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#575f6b",
                        "primary": "#001736",
                        "surface": "#f8f9ff",
                        "inverse-primary": "#a9c7ff",
                        "on-error": "#ffffff",
                        "surface-bright": "#f8f9ff",
                        "surface-variant": "#d1e4ff",
                        "on-primary-fixed": "#001b3d",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#e9f1ff",
                        "tertiary": "#00192c",
                        "on-secondary-container": "#5d6571",
                        "surface-dim": "#c4dcfd",
                        "on-secondary-fixed": "#141c26",
                        "surface-tint": "#405f91",
                        "primary-fixed": "#d6e3ff",
                        "on-tertiary-container": "#7b96b2",
                        "tertiary-fixed-dim": "#aec9e7",
                        "surface-container-highest": "#d1e4ff",
                        "secondary-fixed": "#dbe3f1",
                        "on-tertiary-fixed-variant": "#2e4962",
                        "on-tertiary-fixed": "#001d32",
                        "inverse-surface": "#19324b",
                        "surface-container-high": "#dbe9ff",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#264778",
                        "primary-container": "#002b5b",
                        "error-container": "#ffdad6",
                        "on-surface": "#011d35",
                        "on-secondary": "#ffffff",
                        "on-background": "#011d35",
                        "surface-container": "#e4efff",
                        "on-surface-variant": "#43474f",
                        "on-secondary-fixed-variant": "#3f4752",
                        "secondary-fixed-dim": "#bfc7d4",
                        "outline": "#747780",
                        "tertiary-container": "#102e45",
                        "background": "#f8f9ff",
                        "on-error-container": "#93000a",
                        "tertiary-fixed": "#cee5ff",
                        "primary-fixed-dim": "#a9c7ff",
                        "outline-variant": "#c4c6d0",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "surface-container-low": "#eef4ff",
                        "secondary-container": "#dbe3f1",
                        "on-primary-container": "#7594ca"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-md": "16px",
                        "margin-mobile": "20px",
                        "gutter": "16px",
                        "stack-sm": "8px",
                        "stack-lg": "24px",
                        "base-unit": "4px"
                    },
                    "fontFamily": {
                        "body-sm": ["Manrope"],
                        "label-md": ["Manrope"],
                        "label-lg": ["Manrope"],
                        "body-md": ["Manrope"],
                        "headline-sm": ["Manrope"],
                        "headline-md": ["Manrope"],
                        "headline-lg": ["Manrope"],
                        "body-lg": ["Manrope"]
                    },
                    "fontSize": {
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }

        body {
            background-color: #f8f9ff;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="font-body-md text-on-background selection:bg-primary selection:text-white">
    <!-- Top Navigation Bar -->
    <header
        class="bg-white dark:bg-slate-900 border-b border-blue-50 dark:border-slate-800 shadow-[0px_4px_20px_rgba(0,82,204,0.08)] fixed top-0 w-full z-50">
        <div class="flex items-center justify-between px-5 h-16 w-full max-w-md mx-auto">
            <button class="text-blue-700 dark:text-blue-400 active:scale-95 transition-transform duration-200">
                <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
            </button>
            <h1 class="font-manrope text-sm font-semibold tracking-tight text-blue-700 dark:text-blue-400">Edit Product
            </h1>
            <button class="text-blue-700 dark:text-blue-400 active:scale-95 transition-transform duration-200">
                <span class="material-symbols-outlined" data-icon="help">help</span>
            </button>
        </div>
    </header>
    <!-- Main Canvas -->
    <main class="pt-24 pb-32 px-margin-mobile w-full max-w-md mx-auto">
        <!-- Product Visual Header (Asymmetric Layout) -->
        <section class="mb-stack-lg">
            <div
                class="relative bg-white border border-outline-variant/30 rounded-xl p-stack-md flex items-center gap-stack-md overflow-hidden">
                <div class="relative z-10 w-20 h-20 rounded-lg overflow-hidden flex-shrink-0 bg-surface-container">
                    <img alt="Buffalo Milk" class="w-full h-full object-cover"
                        data-alt="A clean, minimalist product photograph of fresh milk in a glass bottle set against a soft blue and white background. The lighting is bright and airy, emphasizing purity and freshness. The composition is professional and high-end, using a limited color palette of cool whites and primary blues to maintain a modern, minimalist dairy industry aesthetic."
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuDomd8ZIIMnUeU7fbDas_5LeZeCANFh5NXi0aPC0G0u66GpeFbCFfg4Ui3s7Z4yWo2Y_L7pJApKxYgyMAOeZ6WVkxBlWEhviCuYW8IexwBAACX1UjQNpzBwMGgQOnpuyj9xAfgNXWj-iDHAddJxd5y2KTadeXXTDanDnfvvIsOIPkewouFaqHQWB0O2xUo1Ax1CExBPchdlMspwGVxVOsP6oiBOw61HIXRlDCIETwNnVPXuM_wf6lTWjXxYhyFS6Ih5E896kv0QgplM" />
                </div>
                <div class="relative z-10">
                    <span class="font-label-md text-primary/60 uppercase tracking-widest">Currently Editing</span>
                    <h2 class="font-headline-sm text-primary">Buffalo Milk (A2)</h2>
                    <p class="font-body-sm text-secondary">SKU: DP-BM-042</p>
                </div>
                <!-- Abstract Geometric Background Accent -->
                <div class="absolute -right-4 -top-4 w-24 h-24 bg-primary-fixed/20 rounded-full blur-2xl"></div>
            </div>
        </section>
        <!-- Edit Form -->
        <form class="space-y-stack-lg">
            <!-- Basic Information -->
            <div class="space-y-stack-md">
                <div class="flex flex-col gap-stack-sm">
                    <label class="font-label-lg text-primary ml-1">Product Name</label>
                    <input
                        class="w-full h-12 px-4 rounded-lg border border-outline-variant bg-white focus:border-primary focus:ring-1 focus:ring-primary transition-all font-body-md text-on-surface"
                        type="text" value="Buffalo Milk (A2)" />
                </div>
                <div class="grid grid-cols-2 gap-stack-md">
                    <div class="flex flex-col gap-stack-sm">
                        <label class="font-label-lg text-primary ml-1">Category</label>
                        <div class="relative">
                            <select
                                class="w-full h-12 px-4 appearance-none rounded-lg border border-outline-variant bg-white focus:border-primary focus:ring-1 focus:ring-primary transition-all font-body-md text-on-surface">
                                <option>Milk</option>
                                <option>Ghee</option>
                                <option>Curd</option>
                                <option>Butter</option>
                            </select>
                            <span
                                class="material-symbols-outlined absolute right-3 top-3 text-secondary pointer-events-none"
                                data-icon="expand_more">expand_more</span>
                        </div>
                    </div>
                    <div class="flex flex-col gap-stack-sm">
                        <label class="font-label-lg text-primary ml-1">Unit Type</label>
                        <div class="relative">
                            <select
                                class="w-full h-12 px-4 appearance-none rounded-lg border border-outline-variant bg-white focus:border-primary focus:ring-1 focus:ring-primary transition-all font-body-md text-on-surface">
                                <option>Litre</option>
                                <option>kg</option>
                                <option>Pouch</option>
                                <option>Box</option>
                            </select>
                            <span
                                class="material-symbols-outlined absolute right-3 top-3 text-secondary pointer-events-none"
                                data-icon="expand_more">expand_more</span>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Pricing Section (Prominent Field) -->
            <div class="p-stack-md rounded-xl bg-surface-container-low border border-primary/5">
                <div class="flex flex-col gap-stack-sm">
                    <label class="font-label-lg text-primary flex items-center gap-2">
                        <span class="material-symbols-outlined text-[18px]" data-icon="payments">payments</span>
                        Price per unit (Rate)
                    </label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 font-headline-sm text-primary">₹</span>
                        <input
                            class="w-full h-16 pl-10 pr-4 rounded-lg border border-outline-variant bg-white focus:border-primary focus:ring-1 focus:ring-primary transition-all font-headline-md text-primary"
                            type="number" value="84.00" />
                    </div>
                    <p class="font-label-md text-secondary ml-1 italic">Last updated 12 days ago</p>
                </div>
            </div>
            <!-- Additional Details (Bento-style info cards) -->
            <div class="grid grid-cols-1 gap-stack-sm">
                <div
                    class="flex items-center justify-between p-stack-md rounded-lg border border-outline-variant bg-white">
                    <div class="flex items-center gap-stack-sm">
                        <span class="material-symbols-outlined text-secondary"
                            data-icon="inventory_2">inventory_2</span>
                        <span class="font-body-md text-on-surface">In Stock Inventory</span>
                    </div>
                    <span class="font-label-lg text-primary">420 Ltrs</span>
                </div>
                <div
                    class="flex items-center justify-between p-stack-md rounded-lg border border-outline-variant bg-white">
                    <div class="flex items-center gap-stack-sm">
                        <span class="material-symbols-outlined text-secondary" data-icon="visibility">visibility</span>
                        <span class="font-body-md text-on-surface">Visible in Catalog</span>
                    </div>
                    <div class="w-10 h-5 bg-primary rounded-full relative">
                        <div class="absolute right-1 top-1 w-3 h-3 bg-white rounded-full"></div>
                    </div>
                </div>
            </div>
        </form>
    </main>
    <!-- Bottom Action Area -->
    <div
        class="fixed bottom-0 w-full max-w-md left-1/2 -translate-x-1/2 bg-white/80 backdrop-blur-md px-margin-mobile py-stack-md border-t border-blue-50 z-50">
        <button
            class="w-full h-14 bg-primary text-white font-manrope font-bold text-body-md rounded-xl shadow-[0px_8px_24px_rgba(0,23,54,0.15)] active:scale-95 transition-all duration-200">
            Save Changes
        </button>
    </div>
    <!-- Bottom Navigation (Shared Component Context) -->
    <!-- Suppressed based on "Task-Focused" rule for edit sub-page -->
</body>

</html>
