<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error-container": "#ffdad6",
                        "tertiary": "#00192c",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#e4efff",
                        "secondary-container": "#dbe3f1",
                        "tertiary-fixed-dim": "#aec9e7",
                        "on-secondary": "#ffffff",
                        "on-surface": "#011d35",
                        "surface-container-highest": "#d1e4ff",
                        "surface-container-high": "#dbe9ff",
                        "outline-variant": "#c4c6d0",
                        "on-primary-fixed-variant": "#264778",
                        "background": "#f8f9ff",
                        "tertiary-container": "#102e45",
                        "on-secondary-fixed-variant": "#3f4752",
                        "secondary": "#575f6b",
                        "primary-fixed": "#d6e3ff",
                        "on-primary": "#ffffff",
                        "on-surface-variant": "#43474f",
                        "on-error-container": "#93000a",
                        "surface-dim": "#c4dcfd",
                        "outline": "#747780",
                        "inverse-on-surface": "#e9f1ff",
                        "secondary-fixed": "#dbe3f1",
                        "surface-tint": "#405f91",
                        "on-secondary-fixed": "#141c26",
                        "surface-container-low": "#eef4ff",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed-variant": "#2e4962",
                        "on-background": "#011d35",
                        "tertiary-fixed": "#cee5ff",
                        "secondary-fixed-dim": "#bfc7d4",
                        "surface": "#f8f9ff",
                        "on-error": "#ffffff",
                        "primary-container": "#002b5b",
                        "surface-variant": "#d1e4ff",
                        "surface-bright": "#f8f9ff",
                        "primary-fixed-dim": "#a9c7ff",
                        "on-primary-container": "#7594ca",
                        "primary": "#001736",
                        "on-primary-fixed": "#001b3d",
                        "inverse-surface": "#19324b",
                        "on-tertiary-container": "#7b96b2",
                        "on-secondary-container": "#5d6571",
                        "on-tertiary-fixed": "#001d32",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#a9c7ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-md": "16px",
                        "margin-mobile": "20px",
                        "stack-sm": "8px",
                        "base-unit": "4px",
                        "gutter": "16px",
                        "stack-lg": "24px"
                    },
                    "fontFamily": {
                        "label-md": ["Manrope"],
                        "body-sm": ["Manrope"],
                        "label-lg": ["Manrope"],
                        "headline-sm": ["Manrope"],
                        "headline-md": ["Manrope"],
                        "body-md": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "headline-lg": ["Manrope"]
                    },
                    "fontSize": {
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }

        body {
            font-family: 'Manrope', sans-serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-start">
    <!-- Top AppBar Section -->
    <header
        class="bg-white dark:bg-slate-950 border-b border-slate-100 dark:border-slate-800 docked full-width top-0 sticky z-30 w-full">
        <div class="flex justify-between items-center w-full px-5 py-3">
            <button
                class="text-slate-400 dark:text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors p-2 rounded-full">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <h1 class="text-[#002B5B] dark:text-blue-400 font-manrope font-semibold text-lg">Add New Product</h1>
            <button
                class="text-slate-400 dark:text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors p-2 rounded-full">
                <span class="material-symbols-outlined">help</span>
            </button>
        </div>
    </header>
    <main class="w-full max-w-md px-margin-mobile pt-stack-lg pb-32">
        <!-- Form Layout -->
        <div class="flex flex-col gap-stack-lg">
            <!-- Category Selection -->
            <div class="flex flex-col gap-stack-sm">
                <label class="text-label-md font-label-md text-on-surface-variant">Category</label>
                <div class="relative">
                    <select
                        class="w-full h-12 px-stack-md bg-white border border-outline-variant rounded-lg text-body-md font-body-md appearance-none focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all">
                        <option disabled="" selected="" value="">Select a category</option>
                        <option value="dairy">Dairy &amp; Eggs</option>
                        <option value="beverages">Beverages</option>
                        <option value="snacks">Snacks &amp; Munchies</option>
                        <option value="staples">Atta, Rice &amp; Dal</option>
                    </select>
                    <div
                        class="absolute right-stack-md top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">
                        <span class="material-symbols-outlined">expand_more</span>
                    </div>
                </div>
            </div>
            <!-- Product Name -->
            <div class="flex flex-col gap-stack-sm">
                <label class="text-label-md font-label-md text-on-surface-variant">Product Name</label>
                <input
                    class="w-full h-12 px-stack-md bg-white border border-outline-variant rounded-lg text-body-md font-body-md focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all placeholder:text-outline"
                    placeholder="e.g. Organic Whole Milk" type="text" />
            </div>
            <!-- Unit Selector -->
            <div class="flex flex-col gap-stack-sm">
                <label class="text-label-md font-label-md text-on-surface-variant">Unit Type</label>
                <div class="flex flex-wrap gap-2 overflow-x-auto no-scrollbar py-1">
                    <button
                        class="px-5 py-2 rounded-full bg-primary-container text-white text-label-lg font-label-lg transition-all shadow-sm">liter</button>
                    <button
                        class="px-5 py-2 rounded-full bg-secondary-fixed text-on-secondary-fixed-variant text-label-lg font-label-lg hover:bg-secondary-container transition-all">kg</button>
                    <button
                        class="px-5 py-2 rounded-full bg-secondary-fixed text-on-secondary-fixed-variant text-label-lg font-label-lg hover:bg-secondary-container transition-all">cup</button>
                    <button
                        class="px-5 py-2 rounded-full bg-secondary-fixed text-on-secondary-fixed-variant text-label-lg font-label-lg hover:bg-secondary-container transition-all">piece</button>
                    <button
                        class="px-5 py-2 rounded-full bg-secondary-fixed text-on-secondary-fixed-variant text-label-lg font-label-lg hover:bg-secondary-container transition-all">packet</button>
                    <button
                        class="px-5 py-2 rounded-full bg-secondary-fixed text-on-secondary-fixed-variant text-label-lg font-label-lg hover:bg-secondary-container transition-all">bottle</button>
                    <button
                        class="px-5 py-2 rounded-full bg-secondary-fixed text-on-secondary-fixed-variant text-label-lg font-label-lg hover:bg-secondary-container transition-all">gram</button>
                </div>
            </div>
            <!-- Price Field -->
            <div class="flex flex-col gap-stack-sm">
                <label class="text-label-md font-label-md text-on-surface-variant">Price per unit</label>
                <div class="relative">
                    <div
                        class="absolute left-stack-md top-1/2 -translate-y-1/2 text-on-surface font-semibold text-body-md">
                        ₹</div>
                    <input
                        class="w-full h-12 pl-10 pr-stack-md bg-white border border-outline-variant rounded-lg text-body-md font-body-md focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all placeholder:text-outline"
                        placeholder="0.00" type="number" />
                </div>
            </div>
            <!-- Visual Contextual Illustration (Bento Style Card) -->
            <div
                class="mt-stack-md p-stack-md bg-surface-container rounded-xl border border-outline-variant/30 flex items-center gap-stack-md">
                <div
                    class="w-20 h-20 bg-white rounded-lg flex items-center justify-center border border-outline-variant/20 overflow-hidden shadow-sm">
                    <img alt="Product placeholder" class="w-full h-full object-cover"
                        data-alt="A clean minimalist vector illustration of a delivery box or package with soft blue outlines and geometric shapes on a pristine white background. The style is modern and professional, using a restricted palette of deep navy and sky blue to evoke trust and security in a commercial management context. Soft shadows give the object a slight lift from the surface."
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuBqhAycqZX9j8ZCS6dLtyljIXaH-enAwY0WRwDZkmKUHL3hQOMj2QPSEXzJru6RlDU69-5d_oB1MbVc9TtgNfYvrTqknPnBNZ4s8yTkyBQ1UML3U5iLAx8szMHgHUvmeZzwJIVJtJHdL_oi9LieF3J36MR3cd7wXPpsef9U2Ths37cYy8Gq23RUXAcNIUxpt28NQh4EGubs-_3xg8SMQ0Zgd4WbRN3j5i_XUi7VKCeLIaT7wsB9vDzq8FuhuMD6BWVPnHYQzmx7wEjd" />
                </div>
                <div class="flex-1">
                    <p class="text-label-lg font-label-lg text-primary-container">Inventory Insight</p>
                    <p class="text-body-sm font-body-sm text-on-surface-variant mt-1">Adding units helps in accurate
                        stock tracking and financial reporting.</p>
                </div>
            </div>
        </div>
    </main>
    <!-- Sticky Bottom Button -->
    <div
        class="fixed bottom-0 left-0 right-0 p-margin-mobile bg-white/80 backdrop-blur-md border-t border-slate-100 flex flex-col items-center">
        <button
            class="w-full max-w-md bg-primary-container text-white py-4 rounded-lg font-label-lg text-label-lg shadow-lg active:opacity-70 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-[20px]">save</span>
            Save Product
        </button>
    </div>
    <!-- Success Snackbar -->
    <div class="fixed bottom-28 left-1/2 -translate-x-1/2 w-[calc(100%-40px)] max-w-md z-50">
        <div
            class="bg-inverse-surface text-inverse-on-surface px-stack-md py-stack-md rounded-lg shadow-xl flex items-center justify-between border border-white/10">
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-[#81b1ff]"
                    style="font-variation-settings: 'FILL' 1;">check_circle</span>
                <span class="text-body-sm font-body-sm">Product added successfully</span>
            </div>
            <button
                class="text-primary-fixed-dim text-label-lg font-label-lg hover:text-white transition-colors">DISMISS</button>
        </div>
    </div>
</body>

</html>
