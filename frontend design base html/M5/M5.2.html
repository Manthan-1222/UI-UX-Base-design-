<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries">document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const fullName = document.querySelector('input[placeholder="e.g. Rahul Sharma"]').value.trim();
    const phone = document.querySelector('input[type="number"]').value.trim();
    const address = document.querySelector('textarea').value.trim();
    const customerType = document.querySelector('input[name="customer_type"]:checked').value;

    // 1. Validation Logic
    if (!fullName) {
        alert('Please enter a full name');
        return;
    }
    if (!/^\d{10}$/.test(phone)) {
        alert('Please enter a valid 10-digit phone number');
        return;
    }
    if (!address) {
        alert('Please enter an address');
        return;
    }

    // 2 & 3. Simulate adding entry to respective lists and incrementing counts
    // (In a real app, this would involve state management or API calls)
    console.log(`Adding ${fullName} to ${customerType === 'fixed' ? 'SCREEN_19' : 'SCREEN_275'} with NEW badge`);
    
    // 4. Show green success snackbar
    const snackbar = document.createElement('div');
    snackbar.className = 'fixed bottom-28 left-1/2 -translate-x-1/2 bg-green-600 text-white px-6 py-3 rounded-full shadow-2xl z-[100] font-label-lg animate-in fade-in slide-in-from-bottom-4 duration-300 flex items-center gap-2';
    snackbar.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Customer added successfully';
    document.body.appendChild(snackbar);

    setTimeout(() => {
        snackbar.classList.add('fade-out');
        setTimeout(() => snackbar.remove(), 300);
        
        // Clear form
        document.querySelector('form').reset();
        
        // Simulate navigation
        if (customerType === 'fixed') {
            console.log('Redirecting to Fixed Customer List (SCREEN_19)');
        } else {
            console.log('Redirecting to On-Demand Customer List (SCREEN_275)');
        }
    }, 2000);
});

// Handle Cancel button
document.querySelector('button[type="button"]').addEventListener('click', () => {
    const bottomSheet = document.querySelector('.fixed.inset-0.bg-primary\\/40');
    bottomSheet.style.display = 'none';
});</script>

<body class="bg-surface text-on-surface min-h-[884px] flex flex-col" data-mode="connect" data-stitch-vh="min-h-[884px]===min-h-screen">
<!-- Top App Bar -->
<header class="flex items-center justify-between px-margin-mobile h-16 w-full z-50 bg-surface border-b border-outline-variant shadow-sm sticky top-0">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="receipt_long">receipt_long</span>
<h1 class="font-headline-md text-headline-md font-bold text-primary">DairyKhata</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="search">search</span>
</button>
</header>
<!-- Main Content Area -->
<main class="flex-grow p-margin-mobile pb-32">
<div class="max-w-md mx-auto space-y-stack-lg">
<!-- Background Content Mockup -->
<div class="flex items-center justify-between">
<h2 class="font-headline-sm text-headline-sm text-on-surface">Customer List</h2>
<button class="bg-primary text-on-primary px-4 py-2 rounded-xl font-label-lg flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="add">add</span>
                    New Customer
                </button>
</div>
<div class="space-y-stack-md opacity-40">
<div class="bg-surface-container-lowest p-stack-md rounded-xl border border-outline-variant flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center text-primary font-bold">JD</div>
<div class="flex-grow">
<p class="font-label-lg">Jane Doe</p>
<p class="font-body-sm text-on-surface-variant">+91 98765 43210</p>
</div>
</div>
<div class="bg-surface-container-lowest p-stack-md rounded-xl border border-outline-variant flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center text-primary font-bold">MS</div>
<div class="flex-grow">
<p class="font-label-lg">Michael Smith</p>
<p class="font-body-sm text-on-surface-variant">+91 98765 43211</p>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Sheet Overlay -->
<div class="fixed inset-0 bg-primary/40 backdrop-blur-sm z-[60] flex items-end justify-center">
<!-- Bottom Sheet Content -->
<div class="bg-surface-container-lowest w-full max-w-xl rounded-t-[28px] p-margin-mobile shadow-2xl animate-in slide-in-from-bottom duration-300">
<!-- Drag Handle -->
<div class="w-8 h-1 bg-outline-variant rounded-full mx-auto mb-stack-lg"></div>
<div class="flex justify-between items-center mb-stack-lg">
<h3 class="font-headline-sm text-headline-sm text-on-surface">Add Customer</h3>
</div>
<form class="space-y-stack-lg">
<!-- Customer Type Selector -->
<div class="grid grid-cols-2 gap-stack-md">
<label class="relative cursor-pointer group">
<input checked="" class="peer sr-only" id="type-fixed" name="customer_type" type="radio" value="fixed"/>
<div class="p-stack-md border border-outline-variant rounded-xl flex flex-col gap-2 transition-all peer-checked:border-primary peer-checked:bg-primary/5 group-hover:border-primary-container">
<div class="flex justify-between items-start">
<span class="material-symbols-outlined text-primary" data-icon="calendar_today">calendar_today</span>
<div class="w-4 h-4 rounded-full border-2 border-outline-variant peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center">
<div class="w-1.5 h-1.5 bg-white rounded-full"></div>
</div>
</div>
<div class="">
<p class="font-label-lg text-primary">Fixed Customer</p>
<p class="font-body-sm text-on-surface-variant leading-tight mt-1">Auto daily entries from delivery setup</p>
</div>
</div>
</label>
<label class="relative cursor-pointer group">
<input class="peer sr-only" id="type-on-demand" name="customer_type" type="radio" value="on_demand"/>
<div class="p-stack-md border border-outline-variant rounded-xl flex flex-col gap-2 transition-all peer-checked:border-primary peer-checked:bg-primary/5 group-hover:border-primary-container">
<div class="flex justify-between items-start">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="touch_app">touch_app</span>
<div class="w-4 h-4 rounded-full border-2 border-outline-variant flex items-center justify-center">
<div class="w-1.5 h-1.5 bg-white rounded-full hidden"></div>
</div>
</div>
<div>
<p class="font-label-lg text-on-surface">On-Demand</p>
<p class="font-body-sm text-on-surface-variant leading-tight mt-1">Manual entry creation each day</p>
</div>
</div>
</label>
</div>
<!-- Input Fields -->
<div class="space-y-stack-md">
<!-- Full Name -->
<div class="space-y-base-unit">
<label class="font-label-md text-on-surface-variant ml-1">Full Name</label>
<div class="relative">
<input class="w-full bg-surface border border-outline-variant rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all placeholder:text-on-surface-variant/40" placeholder="e.g. Rahul Sharma" type="text"/>
</div>
</div>
<!-- Phone Number with Validation Error -->
<div class="space-y-base-unit">
<label class="font-label-md text-on-surface-variant ml-1">Phone Number</label>
<div class="relative">
<input class="w-full bg-surface border border-error rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-error/10 focus:border-error transition-all" type="number" value="9876543210"/>
</div>
<div class="flex items-center gap-1.5 ml-1 mt-1 text-error">
<span class="material-symbols-outlined text-[16px]" data-icon="error">error</span>
<p class="font-label-md">This phone number is already registered</p>
</div>
</div>
<!-- Address -->
<div class="space-y-base-unit">
<label class="font-label-md text-on-surface-variant ml-1">Address</label>
<div class="relative">
<textarea class="w-full bg-surface border border-outline-variant rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all placeholder:text-on-surface-variant/40 resize-none" placeholder="Flat No, Wing, Society Name, Area..." rows="3"></textarea>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-3 pt-stack-md">
<button class="w-full bg-primary text-on-primary py-4 rounded-xl font-label-lg active:scale-95 transition-transform shadow-md" type="submit">
                        Save Customer Profile
                    </button>
<button class="w-full text-primary py-2 font-label-lg hover:bg-primary/5 rounded-xl transition-colors" type="button">
                        Cancel
                    </button>
</div>
</form>
</div>
</div>
<!-- Bottom Navigation Bar (Visual Reference only for context) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center bg-surface border-t border-outline-variant h-20 px-2 pb-safe">
<div class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1">
<span class="material-symbols-outlined text-xl" data-icon="menu_book">menu_book</span>
<span class="font-label-md text-label-md mt-1">Ledger</span>
</div>
<div class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-xl px-4 py-1">
<span class="material-symbols-outlined text-xl" data-icon="group" style="font-variation-settings: 'FILL' 1;">group</span>
<span class="font-label-md text-label-md mt-1">Customers</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1">
<span class="material-symbols-outlined text-xl" data-icon="inventory_2">inventory_2</span>
<span class="font-label-md text-label-md mt-1">Inventory</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1">
<span class="material-symbols-outlined text-xl" data-icon="settings">settings</span>
<span class="font-label-md text-label-md mt-1">Settings</span>
</div>
</nav>
<script>document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const fullName = document.querySelector('input[placeholder="e.g. Rahul Sharma"]').value.trim();
    const phone = document.querySelector('input[type="number"]').value.trim();
    const address = document.querySelector('textarea').value.trim();
    const customerType = document.querySelector('input[name="customer_type"]:checked').value;

    // 1. Validation Logic
    if (!fullName) {
        alert('Please enter a full name');
        return;
    }
    if (!/^\d{10}$/.test(phone)) {
        alert('Please enter a valid 10-digit phone number');
        return;
    }
    if (!address) {
        alert('Please enter an address');
        return;
    }

    // 2 & 3. Simulate adding entry to respective lists and incrementing counts
    // (In a real app, this would involve state management or API calls)
    console.log(`Adding ${fullName} to ${customerType === 'fixed' ? 'SCREEN_19' : 'SCREEN_275'} with NEW badge`);
    
    // 4. Show green success snackbar
    const snackbar = document.createElement('div');
    snackbar.className = 'fixed bottom-28 left-1/2 -translate-x-1/2 bg-green-600 text-white px-6 py-3 rounded-full shadow-2xl z-[100] font-label-lg animate-in fade-in slide-in-from-bottom-4 duration-300 flex items-center gap-2';
    snackbar.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Customer added successfully';
    document.body.appendChild(snackbar);

    setTimeout(() => {
        snackbar.classList.add('fade-out');
        setTimeout(() => snackbar.remove(), 300);
        
        // Clear form
        document.querySelector('form').reset();
        
        // Simulate navigation
        if (customerType === 'fixed') {
            console.log('Redirecting to Fixed Customer List (SCREEN_19)');
        } else {
            console.log('Redirecting to On-Demand Customer List (SCREEN_275)');
        }
    }, 2000);
});

// Handle Cancel button
document.querySelector('button[type="button"]').addEventListener('click', () => {
    const bottomSheet = document.querySelector('.fixed.inset-0.bg-primary\\/40');
    bottomSheet.style.display = 'none';
});</script></body></html>
