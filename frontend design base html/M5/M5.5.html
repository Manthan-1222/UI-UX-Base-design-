<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Edit Customer</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&amp;display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#001d32",
                        "background": "#f8f9ff",
                        "surface-container": "#e4efff",
                        "surface-bright": "#f8f9ff",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed-dim": "#aec9e7",
                        "surface-container-low": "#eef4ff",
                        "on-secondary-fixed-variant": "#3f4752",
                        "on-secondary-fixed": "#141c26",
                        "error": "#ba1a1a",
                        "on-background": "#011d35",
                        "on-error": "#ffffff",
                        "inverse-surface": "#19324b",
                        "inverse-on-surface": "#e9f1ff",
                        "on-surface-variant": "#43474f",
                        "surface-container-high": "#dbe9ff",
                        "outline-variant": "#c4c6d0",
                        "secondary-container": "#dbe3f1",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#102e45",
                        "on-primary": "#ffffff",
                        "tertiary-fixed": "#cee5ff",
                        "secondary-fixed-dim": "#bfc7d4",
                        "on-secondary-container": "#5d6571",
                        "on-surface": "#011d35",
                        "surface-container-highest": "#d1e4ff",
                        "inverse-primary": "#a9c7ff",
                        "primary": "#001736",
                        "surface-dim": "#c4dcfd",
                        "outline": "#747780",
                        "tertiary": "#00192c",
                        "primary-fixed": "#d6e3ff",
                        "primary-container": "#002b5b",
                        "on-primary-fixed-variant": "#264778",
                        "primary-fixed-dim": "#a9c7ff",
                        "on-tertiary-container": "#7b96b2",
                        "surface-variant": "#d1e4ff",
                        "on-primary-fixed": "#001b3d",
                        "on-primary-container": "#7594ca",
                        "surface-tint": "#405f91",
                        "surface": "#f8f9ff",
                        "secondary": "#575f6b",
                        "error-container": "#ffdad6",
                        "on-secondary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed": "#dbe3f1",
                        "on-tertiary-fixed-variant": "#2e4962"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "20px",
                        "base-unit": "4px",
                        "stack-sm": "8px",
                        "stack-md": "16px",
                        "stack-lg": "24px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "headline-md": ["Manrope"],
                        "headline-lg": ["Manrope"],
                        "label-md": ["Manrope"],
                        "body-sm": ["Manrope"],
                        "headline-sm": ["Manrope"],
                        "body-md": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "label-lg": ["Manrope"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen flex flex-col">
    <!-- TopAppBar from JSON -->
    <header
        class="bg-surface border-b border-outline-variant fixed top-0 w-full flex items-center px-margin-mobile h-16 z-50">
        <button aria-label="Go back"
            class="text-on-surface-variant hover:bg-surface-container-high transition-colors active:scale-95 duration-100 p-2 -ml-2 rounded-full flex items-center justify-center">
            <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
        </button>
        <h1 class="ml-2 font-headline-sm text-headline-sm font-bold text-primary">Edit Customer</h1>
    </header>
    <!-- Main Content Canvas -->
    <main class="flex-1 mt-16 px-margin-mobile py-stack-lg flex flex-col gap-stack-lg overflow-y-auto">
        <!-- Form Section -->
        <form class="flex flex-col gap-stack-md flex-1">
            <!-- Customer Type Segmented Control -->
            <div class="flex flex-col gap-stack-sm mb-2">
                <label class="font-label-md text-label-md text-on-surface-variant">Customer Type</label>
                <div class="flex p-1 bg-surface-container rounded-lg border border-surface-container-high">
                    <button
                        class="flex-1 py-2 font-label-lg text-label-lg rounded-md bg-primary text-on-primary shadow-sm transition-all text-center"
                        type="button">
                        Fixed
                    </button>
                    <button
                        class="flex-1 py-2 font-label-lg text-label-lg rounded-md text-on-surface-variant hover:bg-surface-container-highest transition-all text-center"
                        type="button">
                        On-Demand
                    </button>
                </div>
            </div>
            <!-- Full Name Input -->
            <div class="flex flex-col gap-stack-sm">
                <label class="font-label-md text-label-md text-on-surface-variant" for="fullName">Full Name</label>
                <input
                    class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all shadow-sm"
                    id="fullName" type="text" value="Rajesh Kumar" />
            </div>
            <!-- Phone Number Input -->
            <div class="flex flex-col gap-stack-sm">
                <label class="font-label-md text-label-md text-on-surface-variant" for="phoneNumber">Phone
                    Number</label>
                <div class="relative flex items-center">
                    <span class="absolute left-4 text-on-surface-variant material-symbols-outlined text-[20px]"
                        data-icon="call">call</span>
                    <input
                        class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg pl-12 pr-4 py-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all shadow-sm"
                        id="phoneNumber" type="tel" value="+91 88888 77777" />
                </div>
            </div>
            <!-- Address Textarea -->
            <div class="flex flex-col gap-stack-sm mb-4">
                <label class="font-label-md text-label-md text-on-surface-variant" for="address">Address</label>
                <textarea
                    class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all shadow-sm resize-none"
                    id="address" rows="3">B-402, Skyline Towers, New Town Extension</textarea>
            </div>
            <!-- Account Status Toggle Card -->
            <div
                class="flex items-center justify-between bg-surface-container-lowest border border-outline-variant rounded-xl p-4 shadow-sm mt-auto">
                <div class="flex flex-col">
                    <span class="font-label-lg text-label-lg text-on-surface">Account Status</span>
                    <span class="font-body-sm text-body-sm text-primary">Active</span>
                </div>
                <!-- Pure CSS Switch Mockup for Visuals -->
                <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                    <input checked=""
                        class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-on-primary border-4 appearance-none cursor-pointer right-0 border-primary shadow-sm z-10"
                        id="toggle" name="toggle" style="right: 0; border-color: #001736;" type="checkbox" />
                    <label class="toggle-label block overflow-hidden h-6 rounded-full bg-primary cursor-pointer"
                        for="toggle"></label>
                </div>
            </div>
        </form>
        <!-- Footer Action -->
        <div class="mt-8 pb-safe">
            <button
                class="w-full bg-primary text-on-primary font-label-lg text-label-lg py-4 rounded-xl shadow-sm hover:bg-primary-container transition-colors active:scale-95 duration-200 flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-[20px]" data-icon="save">save</span>
                Save Changes
            </button>
        </div>
    </main>
</body>

</html>
