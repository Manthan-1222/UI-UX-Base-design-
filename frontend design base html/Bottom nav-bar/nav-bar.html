<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blue Pill Navbar</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #dde4ef;
            font-family: sans-serif;
        }

        .pill-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #3264F5;
            border-radius: 9999px;
            padding: 0 28px;
            height: 72px;
            width: 480px;
            position: relative;
        }

        .sliding-circle {
            position: absolute;
            width: 52px;
            height: 52px;
            background: #fff;
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
            transition: left 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            width: 44px;
            height: 72px;
            position: relative;
            z-index: 1;
            transition: opacity 0.15s;
        }

        .nav-item:hover {
            opacity: 0.8;
        }

        .nav-item svg {
            width: 26px;
            height: 26px;
            fill: none;
            stroke-width: 1.7;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke: rgba(255, 255, 255, 0.45);
            transition: stroke 0.2s;
        }

        .nav-item.active svg {
            stroke: #3264F5;
        }
    </style>
</head>

<body>

    <div class="pill-nav" id="nav">
        <div class="sliding-circle" id="circle"></div>

        <!-- Home -->
        <div class="nav-item active" data-idx="0">
            <svg viewBox="0 0 24 24">
                <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z" />
                <path d="M9 21V12h6v9" />
            </svg>
        </div>

        <!-- Orders -->
        <div class="nav-item" data-idx="1">
            <svg viewBox="0 0 24 24">
                <rect x="4" y="3" width="16" height="18" rx="2" />
                <line x1="8" y1="7" x2="16" y2="7" />
                <line x1="8" y1="11" x2="16" y2="11" />
                <line x1="8" y1="15" x2="12" y2="15" />
            </svg>
        </div>

        <!-- QR Scan -->
        <div class="nav-item" data-idx="2">
            <svg viewBox="0 0 24 24">
                <rect x="3" y="3" width="6" height="6" rx="1" />
                <rect x="15" y="3" width="6" height="6" rx="1" />
                <rect x="3" y="15" width="6" height="6" rx="1" />
                <path d="M15 15h1v1h-1zM17 15h1v1h-1zM19 15h2v2h-2zM15 17h2v2h-2zM17 19h2v2h-2zM19 19h2v2" />
            </svg>
        </div>

        <!-- Card -->
        <div class="nav-item" data-idx="3">
            <svg viewBox="0 0 24 24">
                <rect x="2" y="6" width="20" height="13" rx="2" />
                <path d="M2 10h20" />
                <path d="M6 15h4" />
            </svg>
        </div>

        <!-- Profile -->
        <div class="nav-item" data-idx="4">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="8" r="4" />
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
            </svg>
        </div>
    </div>

    <script>
        const nav = document.getElementById('nav');
        const circle = document.getElementById('circle');
        const items = document.querySelectorAll('.nav-item');

        function moveCircle(item) {
            const navRect = nav.getBoundingClientRect();
            const itemRect = item.getBoundingClientRect();
            const centerX = itemRect.left - navRect.left + itemRect.width / 2;
            circle.style.left = (centerX - 26) + 'px';
        }

        items.forEach(item => {
            item.addEventListener('click', () => {
                items.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                moveCircle(item);
            });
        });

        requestAnimationFrame(() => {
            const active = document.querySelector('.nav-item.active');
            if (active) moveCircle(active);
        });
    </script>

</body>

</html>
